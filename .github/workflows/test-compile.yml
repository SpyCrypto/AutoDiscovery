name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  contract:
    name: Contract — lint, test, build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint contract package
        working-directory: autodiscovery-contract
        run: npm run lint

      - name: Run contract tests
        working-directory: autodiscovery-contract
        run: npm run test

      - name: Build contract package
        working-directory: autodiscovery-contract
        run: npm run build

      - name: Upload compiled contracts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-contracts
          path: autodiscovery-contract/src/managed/
          retention-days: 30
          if-no-files-found: error

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: contract-dist
          path: autodiscovery-contract/dist/
          retention-days: 30
          if-no-files-found: error

  frontend-realdeal:
    name: Frontend realDeal — lint & test
    runs-on: ubuntu-latest
    needs: contract
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download compiled contracts
        uses: actions/download-artifact@v4
        with:
          name: compiled-contracts
          path: autodiscovery-contract/src/managed/

      - name: Copy contract assets to public
        working-directory: frontend-realdeal
        run: npm run copy-contracts

      - name: Lint frontend-realdeal
        working-directory: frontend-realdeal
        run: npm run lint

      - name: Run frontend-realdeal tests
        working-directory: frontend-realdeal
        run: npm run test

  frontend-demoland:
    name: Frontend demoLand — lint & build
    runs-on: ubuntu-latest
    needs: contract
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build contract package
        working-directory: autodiscovery-contract
        run: npm run build

      - name: Lint frontend-demoland
        working-directory: frontend-demoland-vite-react
        run: npm run lint

      - name: Build frontend (demoland mode)
        working-directory: frontend-demoland-vite-react
        run: npm run build:demo

  verify-artifacts:
    name: Verify artifacts
    runs-on: ubuntu-latest
    needs: contract
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download compiled contracts
        uses: actions/download-artifact@v4
        with:
          name: compiled-contracts
          path: autodiscovery-contract/src/managed/

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: contract-dist
          path: autodiscovery-contract/dist/

      - name: Verify artifacts
        run: |
          ls -la autodiscovery-contract/src/managed/
          test -n "$(ls -A autodiscovery-contract/src/managed/)" || exit 1
          ls -la autodiscovery-contract/dist/
          test -n "$(ls -A autodiscovery-contract/dist/)" || exit 1
